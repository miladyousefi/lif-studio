name: Build Windows EXE

# Builds a standalone Windows .exe with PyInstaller on a GitHub-hosted Windows
# runner. Download the result from the run's "Artifacts", or — when you push a
# tag like v2.0.0 — from the auto-created Release.

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:        # lets you run it manually from the Actions tab

permissions:
  contents: write           # needed to create a Release and upload the .exe zip

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: x64        # 64-bit: required to read .lif files > 2 GB
          cache: pip

      - name: Verify 64-bit Python
        run: python -c "import struct,sys; assert struct.calcsize('P')*8==64, 'NOT 64-bit'; print('Python', sys.version, '64-bit OK')"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller
        run: python -m PyInstaller --noconfirm --clean packaging/lif_studio.spec

      - name: Package into a zip
        run: Compress-Archive -Path dist/lif-studio/* -DestinationPath lif-studio-windows.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: lif-studio-windows
          path: lif-studio-windows.zip
          retention-days: 30

      - name: Attach to release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: lif-studio-windows.zip
